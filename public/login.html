<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — WebSite Builder</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Login-specific overrides ── */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.05);
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-brand .logo-icon {
      font-size: 2.2rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .login-brand .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-brand p {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    /* Divider */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .login-divider span {
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    /* Google SSO button */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.875rem 1.5rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: rgba(255,255,255,0.85);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      text-decoration: none;
      margin-bottom: 0.5rem;
    }

    .btn-google:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.22);
      transform: translateY(-1px);
    }

    .btn-google svg {
      flex-shrink: 0;
    }

    /* Form fields */
    .login-form .form-group {
      margin-bottom: 1.25rem;
    }

    .login-form label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }

    .login-form .input-box {
      position: relative;
    }

    .login-form input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    .login-form input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .login-form input:focus {
      border-color: rgba(167, 139, 250, 0.6);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
    }

    /* Password toggle */
    .input-icon-right {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .input-icon-right:hover {
      color: rgba(255,255,255,0.7);
    }

    .login-form input[type="password"],
    .login-form input[type="text"].password-field {
      padding-right: 3rem;
    }

    /* Row: remember + forgot */
    .login-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }

    .remember-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      user-select: none;
    }

    .remember-label input[type="checkbox"] {
      accent-color: #a78bfa;
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .forgot-link {
      color: #a78bfa;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: #c4b5fd;
    }

    /* Submit */
    .btn-login {
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.45);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner inside button */
    .btn-login .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error message */
    .login-error {
      display: none;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 10px;
      color: #fca5a5;
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      text-align: center;
    }

    /* Sign up link */
    .login-footer {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.4);
    }

    .login-footer a {
      color: #a78bfa;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .login-footer a:hover {
      color: #c4b5fd;
    }

    /* Back to home */
    .back-home {
      position: fixed;
      top: 1.25rem;
      left: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s, transform 0.2s;
      z-index: 10;
    }

    .back-home:hover {
      color: rgba(255,255,255,0.8);
      transform: translateX(-3px);
    }

    /* ── Fix for white background conflict with main style.css ── */
body.form-page {
  background: #0f0a1e !important;
  /* Restore native cursor on login page — the custom cursor element
     and its mousemove handler only live on index.html, so the
     style.css `cursor: none` rule was leaving login users with
     no visible cursor anywhere except inside text inputs. */
  cursor: auto !important;
}
body.form-page * { cursor: auto; }
body.form-page input,
body.form-page textarea { cursor: text; }
body.form-page button,
body.form-page a,
body.form-page .btn-google,
body.form-page .btn-login,
body.form-page .input-icon-right,
body.form-page .remember-label,
body.form-page .forgot-link,
body.form-page .login-footer a,
body.form-page .back-home { cursor: pointer; }

.login-card {
  background: rgba(255, 255, 255, 0.06) !important;
  border: 1px solid rgba(255, 255, 255, 0.12) !important;
}

.login-form input {
  color: #1a1a2e !important;
  background: rgba(255, 255, 255, 0.92) !important;
  border-color: rgba(124, 58, 237, 0.4) !important;
}

.login-form input::placeholder {
  color: #999 !important;
}

.login-form label {
  color: rgba(255, 255, 255, 0.85) !important;
}

.login-brand .logo-text,
.login-brand p,
.login-footer,
.remember-label,
.login-divider span {
  color: rgba(255, 255, 255, 0.75) !important;
  -webkit-text-fill-color: unset;
}

.login-brand .logo-text {
  background: linear-gradient(135deg, #a78bfa, #60a5fa) !important;
  -webkit-background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  background-clip: text !important;
}
  </style>
</head>
<body class="form-page">
  <div class="stars"></div>

  <!-- Back to home -->
  <a href="/" class="back-home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back to Home
  </a>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">WebSite Builder</span>
        <p>Sign in to your account</p>
      </div>

      <!-- Google SSO -->
      <a href="/auth/google" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </a>

      <div class="login-divider">
        <span>or sign in with email</span>
      </div>

      <!-- Error banner -->
      <div class="login-error" id="loginError"></div>

      <!-- Login form -->
      <form class="login-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email address</label>
          <div class="input-box">
            <input
              type="email"
              id="loginEmail"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-box">
            <input
              type="password"
              id="loginPassword"
              name="password"
              class="password-field"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <button type="button" class="input-icon-right" id="togglePassword" aria-label="Toggle password visibility">
              <!-- Eye icon -->
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (hidden by default) -->
              <svg id="eyeOffIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="login-meta">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe" name="remember">
            Remember me
          </label>
          <a href="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <div class="spinner" id="loginSpinner"></div>
        </button>
      </form>

      <!-- Sign up CTA -->
      <div class="login-footer">
        Don't have an account? <a href="/register">Sign up free</a>
      </div>

    </div>
  </div>

  <script>
    // ── Password visibility toggle ──
    const toggleBtn = document.getElementById('togglePassword');
    const pwdInput  = document.getElementById('loginPassword');
    const eyeOn     = document.getElementById('eyeIcon');
    const eyeOff    = document.getElementById('eyeOffIcon');

    toggleBtn.addEventListener('click', () => {
      const isHidden = pwdInput.type === 'password';
      pwdInput.type  = isHidden ? 'text' : 'password';
      eyeOn.style.display  = isHidden ? 'none'  : 'block';
      eyeOff.style.display = isHidden ? 'block' : 'none';
    });

    // ── Form submit ──
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl  = document.getElementById('loginError');
      const btn      = document.getElementById('loginBtn');
      const btnText  = document.getElementById('loginBtnText');
      const spinner  = document.getElementById('loginSpinner');

      // Hide previous errors
      errorEl.style.display = 'none';

      // Basic client-side validation
      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return;
      }

      // Loading state
      btn.disabled         = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          // ✅ Redirect to main app
          window.location.href = data.redirect || '/';
        } else {
          errorEl.textContent = data.error || 'Invalid email or password.';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled          = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
