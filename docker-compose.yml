version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      # Overrides .env for Docker networking — connects to the 'db' service container
      - DATABASE_URL=mysql://${DB_USER:-app_user}:${DB_PASSWORD:-change-me-in-prod}@db:3306/${DB_NAME:-beyondsite}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Local dev only — spins up a MySQL container.
  # For production: use AWS RDS or any managed MySQL.
  # Set DATABASE_URL in .env to point at your managed DB instead.
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-in-prod}
      MYSQL_DATABASE: ${DB_NAME:-beyondsite}
      MYSQL_USER: ${DB_USER:-app_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me-in-prod}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  db_data: